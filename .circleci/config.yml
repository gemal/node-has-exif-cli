version: 2.1

orbs:
  node: circleci/node@7.2.1

jobs:
  build:
    docker:
      - image: cimg/node:lts
    resource_class: medium
    steps:
      - checkout

      - run:
          name: Install safe-chain
          command: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh -s -- --ci

      - node/install-packages:
          pkg-manager: npm

      - run:
          name: Audit packages
          command: npm audit --audit-level=moderate

      - run:
          name: List packages
          command: npm ls

      - run:
          name: Snyk security test
          command: npx snyk test

      - run:
          name: Check EditorConfig
          command: npx editorconfig-checker

      - run:
          name: Lint
          command: npx eslint '*.js' 'test/*.js'

      - run:
          name: Check package lock
          command: npx check-package-lock

      - run:
          name: Run tests with coverage
          command: npx nyc npm test

      - run:
          name: Coverage report
          command: npx nyc report --reporter=text-lcov > coverage.lcov

      - store_artifacts:
          path: coverage.lcov

workflows:
  build-and-test:
    jobs:
      - build
